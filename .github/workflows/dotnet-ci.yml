name: .NET CI

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore VoidEmpires.sln

      - name: Build
        run: dotnet build VoidEmpires.sln --no-restore

      - name: Test
        run: dotnet test VoidEmpires.sln --no-build
